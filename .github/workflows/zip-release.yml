name: ZIP Release

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate timestamp tag
        run: |
          echo "TAG=$(date -u +%Y%m%d-%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=Push $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV

      - name: Create ZIP
        run: zip -r "${{ github.event.repository.name }}.zip" . -x ".git/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }} 
          name: ${{ env.RELEASE_NAME }}
          body: "Auto-released on push to master"
          make_latest: true
          files: ${{ github.event.repository.name }}.zip