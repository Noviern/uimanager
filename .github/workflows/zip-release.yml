name: ZIP Release on Push

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create ZIP
        run: zip -r "${{ github.event.repository.name }}.zip" . -x ".git/*"

      - name: Force update 'latest' tag
        run: |
          git tag -f latest
          git push -f origin latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old 'latest' release
        continue-on-error: true
        run: gh release delete latest --yes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release (fresh Source code zip)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          body: "Updated on every push to master"
          make_latest: true
          files: ${{ github.event.repository.name }}.zip